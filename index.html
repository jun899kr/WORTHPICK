<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WORTHPICK</title>
  <meta name="description" content="세상의 모든 가치있는 것들에 대해" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f7f2ea;
      color: #222;
    }

    a { color: inherit; text-decoration: none; }

    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px;
      background: #fffaf3;
      border-right: 1px solid #e5ded3;
      padding: 28px 22px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .category-list { list-style: none; margin-bottom: 28px; }

    .category-list li {
      padding: 10px 0;
      font-size: 15px;
      color: #555;
      cursor: pointer;
      border-bottom: 1px solid #eee4d8;
    }

    .category-list li.active,
    .category-list li:hover {
      color: #111;
      font-weight: 700;
    }

    .post-list-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    .side-post {
      font-size: 14px;
      line-height: 1.45;
      padding: 9px 0;
      border-bottom: 1px solid #eee4d8;
      color: #444;
      cursor: pointer;
    }

    .side-post:hover {
      color: #000;
      font-weight: 600;
    }

    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 54px 56px;
    }

    .hero {
      text-align: center;
      margin-bottom: 46px;
    }

    .hero h1 {
      font-size: 48px;
      letter-spacing: 4px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .search-box {
      max-width: 720px;
      margin: 0 auto 36px;
    }

    .search-box input {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #ddd2c2;
      border-radius: 999px;
      background: #fffaf3;
      font-size: 15px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .card {
      background: #fffaf3;
      border: 1px solid #e5ded3;
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .card-image-wrap {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: #f1eadf;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid #e5ded3;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body { padding: 20px; }

    .meta {
      font-size: 13px;
      color: #8a7d6e;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 20px;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 80px 0;
      font-size: 16px;
    }

    .load-more-wrap {
      text-align: center;
      margin-top: 34px;
    }

    .load-more-btn {
      border: 1px solid #d8cbb8;
      background: #fffaf3;
      color: #333;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
    }

    .load-more-btn:hover {
      background: #f1eadf;
      font-weight: 600;
    }

    footer {
      margin-top: 70px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    .footer-links {
      margin-bottom: 8px;
    }

    .footer-links a {
      color: #777;
      margin: 0 4px;
    }

    .footer-links a:hover {
      color: #222;
      font-weight: 600;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 900px) {
      .layout { display: block; }

      .sidebar {
        position: relative;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5ded3;
      }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 38px 20px;
      }

      .hero h1 { font-size: 36px; }

      .grid { grid-template-columns: 1fr; }

      .card-image-wrap {
        aspect-ratio: 16 / 10;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">WORTHPICK</div>

      <ul class="category-list" id="categoryList"></ul>

      <div class="post-list-title">게시글 리스트</div>
      <div id="sidePostList"></div>
    </aside>

    <main class="main">
      <section class="hero">
        <h1>WORTHPICK</h1>
        <p>세상의 모든 가치있는 것들에 대해</p>
      </section>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요" />
      </div>

      <section class="grid" id="postGrid"></section>

      <div class="empty" id="emptyMessage">게시글 불러오는 중...</div>

      <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
        <button class="load-more-btn" id="loadMoreBtn">더보기</button>
      </div>

      <footer>
        <div class="footer-links">
          <a href="about.html">About</a>
          <span>·</span>
          <a href="privacy.html">Privacy Policy</a>
          <span>·</span>
          <a href="contact.html">Contact</a>
        </div>
        <div>© WORTHPICK. All rights reserved.</div>
      </footer>
    </main>
  </div>

  <script>
    const DEFAULT_CATEGORIES = [
      "전체",
      "소개",
      "💡 제품 리뷰",
      "🏠 생활 꿀팁",
      "📱 IT & AI",
      "⭐ Worth Pick"
    ];

    const POSTS_JSON_PATH = "./posts.json";
    const POSTS_PER_PAGE = 12;

    let posts = [];
    let currentCategory = "전체";
    let currentSearch = "";
    let visibleCount = POSTS_PER_PAGE;

    const categoryList = document.getElementById("categoryList");
    const sidePostList = document.getElementById("sidePostList");
    const postGrid = document.getElementById("postGrid");
    const emptyMessage = document.getElementById("emptyMessage");
    const searchInput = document.getElementById("searchInput");
    const loadMoreWrap = document.getElementById("loadMoreWrap");
    const loadMoreBtn = document.getElementById("loadMoreBtn");

    async function init() {
      renderCategories();

      try {
        const response = await fetch(POSTS_JSON_PATH, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("posts.json 파일을 찾을 수 없습니다.");
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          throw new Error("posts.json 형식이 올바르지 않습니다.");
        }

        posts = data
          .filter(isValidPost)
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        renderCategories();
        renderPosts();
        renderSidePosts();

      } catch (error) {
        console.error(error);
        postGrid.innerHTML = "";
        sidePostList.innerHTML = "";
        emptyMessage.style.display = "block";
        emptyMessage.textContent = "posts.json 파일을 불러오지 못했습니다. 파일 위치나 JSON 형식을 확인해주세요.";
        loadMoreWrap.style.display = "none";
      }
    }

    function isValidPost(post) {
      return (
        post &&
        post.title &&
        post.category &&
        post.date &&
        post.summary &&
        post.url
      );
    }

    function renderCategories() {
      const postCategories = posts.map(post => post.category);
      const categories = [...new Set([...DEFAULT_CATEGORIES, ...postCategories])];

      categoryList.innerHTML = "";

      categories.forEach(category => {
        const li = document.createElement("li");
        li.textContent = category;

        if (category === currentCategory) {
          li.classList.add("active");
        }

        li.addEventListener("click", () => {
          currentCategory = category;
          visibleCount = POSTS_PER_PAGE;

          document.querySelectorAll(".category-list li").forEach(item => {
            item.classList.remove("active");
          });

          li.classList.add("active");
          renderPosts();
        });

        categoryList.appendChild(li);
      });
    }

    function getFilteredPosts() {
      const keyword = currentSearch.trim().toLowerCase();

      return posts.filter(post => {
        const matchCategory =
          currentCategory === "전체" || post.category === currentCategory;

        const searchableText = `
          ${post.title}
          ${post.category}
          ${post.summary}
          ${post.date}
        `.toLowerCase();

        const matchSearch =
          keyword === "" || searchableText.includes(keyword);

        return matchCategory && matchSearch;
      });
    }

    function renderPosts() {
      const filteredPosts = getFilteredPosts();
      const visiblePosts = filteredPosts.slice(0, visibleCount);

      postGrid.innerHTML = "";

      if (filteredPosts.length === 0) {
        emptyMessage.style.display = "block";
        emptyMessage.textContent = "게시글이 없습니다.";
        loadMoreWrap.style.display = "none";
        return;
      }

      emptyMessage.style.display = "none";

      visiblePosts.forEach(post => {
        const card = document.createElement("article");
        card.className = "card";

        card.addEventListener("click", () => {
          window.location.href = post.url;
        });

        const imagePath = post.image || "images/intro/about-worthpick.webp";

        card.innerHTML = `
          <div class="card-image-wrap">
            <img src="${imagePath}" alt="${post.title}" loading="lazy" onerror="this.src='images/intro/about-worthpick.webp'">
          </div>
          <div class="card-body">
            <div class="meta">${post.category} · ${post.date}</div>
            <h2>${post.title}</h2>
            <p>${post.summary}</p>
          </div>
        `;

        postGrid.appendChild(card);
      });

      if (filteredPosts.length > visibleCount) {
        loadMoreWrap.style.display = "block";
      } else {
        loadMoreWrap.style.display = "none";
      }
    }

    function renderSidePosts() {
      sidePostList.innerHTML = "";

      posts.slice(0, 20).forEach(post => {
        const item = document.createElement("div");
        item.className = "side-post";
        item.textContent = post.title;

        item.addEventListener("click", () => {
          window.location.href = post.url;
        });

        sidePostList.appendChild(item);
      });
    }

    searchInput.addEventListener("input", () => {
      currentSearch = searchInput.value;
      visibleCount = POSTS_PER_PAGE;
      renderPosts();
    });

    loadMoreBtn.addEventListener("click", () => {
      visibleCount += POSTS_PER_PAGE;
      renderPosts();
    });

    init();
  </script>
</body>
</html>
