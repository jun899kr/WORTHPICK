<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WORTHPICK</title>
  <meta name="description" content="세상의 모든 가치있는 것들에 대해" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f7f2ea;
      color: #222;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #fffaf3;
      border-right: 1px solid #e5ded3;
      padding: 28px 22px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }

    .admin-btn {
      width: 100%;
      border: 1px solid #222;
      background: #222;
      color: #fff;
      padding: 11px 12px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .admin-btn:hover {
      opacity: 0.85;
    }

    .category-list {
      list-style: none;
      margin-bottom: 28px;
    }

    .category-list li {
      padding: 10px 0;
      font-size: 15px;
      color: #555;
      cursor: pointer;
      border-bottom: 1px solid #eee4d8;
    }

    .category-list li.active,
    .category-list li:hover {
      color: #111;
      font-weight: 700;
    }

    .post-list-title {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    .side-post {
      font-size: 14px;
      line-height: 1.45;
      padding: 9px 0;
      border-bottom: 1px solid #eee4d8;
      color: #444;
      cursor: pointer;
    }

    .side-post:hover {
      color: #000;
      font-weight: 600;
    }

    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 54px 56px;
    }

    .hero {
      text-align: center;
      margin-bottom: 46px;
    }

    .hero h1 {
      font-size: 48px;
      letter-spacing: 4px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    .search-box {
      max-width: 720px;
      margin: 0 auto 36px;
    }

    .search-box input {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #ddd2c2;
      border-radius: 999px;
      background: #fffaf3;
      font-size: 15px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .card {
      background: #fffaf3;
      border: 1px solid #e5ded3;
      border-radius: 22px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      background: #e7dfd2;
    }

    .card-body {
      padding: 20px;
    }

    .meta {
      font-size: 13px;
      color: #8a7d6e;
      margin-bottom: 10px;
    }

    .card h2 {
      font-size: 20px;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 80px 0;
      font-size: 16px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      inset: 0;
      background: rgba(0,0,0,0.55);
      padding: 40px 20px;
      overflow-y: auto;
    }

    .modal-content {
      max-width: 860px;
      margin: 0 auto;
      background: #fffaf3;
      border-radius: 24px;
      padding: 34px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 22px;
      right: 26px;
      font-size: 28px;
      cursor: pointer;
    }

    .modal-content img {
      width: 100%;
      max-height: 440px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 24px;
    }

    .modal-content h2 {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .modal-content .modal-meta {
      color: #8a7d6e;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .modal-content .content {
      font-size: 17px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }

    footer {
      margin-top: 70px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .layout {
        display: block;
      }

      .sidebar {
        position: relative;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5ded3;
      }

      .main {
        margin-left: 0;
        width: 100%;
        padding: 38px 20px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card img {
        height: 220px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-title">WORTHPICK</div>

      <button class="admin-btn" onclick="goAdmin()">+ 글 추가 / 수정</button>

      <ul class="category-list" id="categoryList">
        <li class="active" onclick="filterCategory('전체', this)">전체</li>
      </ul>

      <div class="post-list-title">게시글 리스트</div>
      <div id="sidePostList"></div>
    </aside>

    <main class="main">
      <section class="hero">
        <h1>WORTHPICK</h1>
        <p>세상의 모든 가치있는 것들에 대해</p>
      </section>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색어를 입력하세요" oninput="searchPosts()" />
      </div>

      <section class="grid" id="postGrid"></section>
      <div class="empty" id="emptyMessage" style="display:none;">게시글이 없습니다.</div>

      <footer>
        © WORTHPICK. All rights reserved.
      </footer>
    </main>
  </div>

  <div class="modal" id="postModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <img id="modalImage" src="" alt="" />
      <h2 id="modalTitle"></h2>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="content" id="modalContent"></div>
    </div>
  </div>

  <script>
    // ==============================
    // 관리자 GitHub 편집 페이지
    // 아래 주소를 네 GitHub index.html 편집 주소로 바꿔줘
    // 예: https://github.com/jun899kr/WORTHPICK/edit/main/index.html
    // ==============================
    const ADMIN_EDIT_URL = "https://github.com/jun899kr/WORTHPICK/edit/main/index.html";

    // ==============================
    // 게시글 데이터
    // 글 추가는 아래 posts 배열에 복사해서 추가하면 됨
    // image는 대표사진 주소
    // 같은 저장소에 images 폴더 만들고 이미지 넣으면 images/파일명.jpg
    // ==============================
    const posts = [
      {
        title: "첫 번째 가치픽 테스트 글",
        category: "생활",
        date: "2026-07-03",
        image: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=1200&q=80",
        summary: "WORTHPICK의 첫 번째 게시글 예시입니다.",
        content: `이곳에 본문을 작성하면 됩니다.

줄바꿈도 그대로 반영됩니다.

나중에는 제품 리뷰, 생활 정보, 비즈니스 정보, 구매 가이드 등을 올릴 수 있습니다.`
      },
      {
        title: "가치있는 제품을 고르는 기준",
        category: "제품",
        date: "2026-07-03",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80",
        summary: "단순히 저렴한 제품보다 오래 쓸 수 있는 제품을 고르는 기준.",
        content: `제품을 고를 때는 가격만 보는 것보다 실제 사용성, 내구성, 후기, 브랜드 신뢰도를 함께 보는 것이 좋습니다.

WORTHPICK은 세상의 가치있는 선택지를 정리하는 공간입니다.`
      }
    ];

    let currentCategory = "전체";
    let currentSearch = "";

    function goAdmin() {
      window.open(ADMIN_EDIT_URL, "_blank");
    }

    function init() {
      renderCategories();
      renderPosts();
      renderSidePosts();
    }

    function renderCategories() {
      const categoryList = document.getElementById("categoryList");
      const categories = ["전체", ...new Set(posts.map(post => post.category))];

      categoryList.innerHTML = "";

      categories.forEach(category => {
        const li = document.createElement("li");
        li.textContent = category;
        li.onclick = function () {
          filterCategory(category, li);
        };

        if (category === currentCategory) {
          li.classList.add("active");
        }

        categoryList.appendChild(li);
      });
    }

    function filterCategory(category, element) {
      currentCategory = category;

      document.querySelectorAll(".category-list li").forEach(li => {
        li.classList.remove("active");
      });

      element.classList.add("active");
      renderPosts();
    }

    function searchPosts() {
      currentSearch = document.getElementById("searchInput").value.toLowerCase();
      renderPosts();
    }

    function getFilteredPosts() {
      return posts.filter(post => {
        const matchCategory = currentCategory === "전체" || post.category === currentCategory;
        const keyword = `${post.title} ${post.category} ${post.summary} ${post.content}`.toLowerCase();
        const matchSearch = keyword.includes(currentSearch);
        return matchCategory && matchSearch;
      });
    }

    function renderPosts() {
      const grid = document.getElementById("postGrid");
      const emptyMessage = document.getElementById("emptyMessage");
      const filteredPosts = getFilteredPosts();

      grid.innerHTML = "";

      if (filteredPosts.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";

      filteredPosts.forEach((post, index) => {
        const card = document.createElement("article");
        card.className = "card";
        card.onclick = () => openModal(post);

        card.innerHTML = `
          <img src="${post.image}" alt="${post.title}">
          <div class="card-body">
            <div class="meta">${post.category} · ${post.date}</div>
            <h2>${post.title}</h2>
            <p>${post.summary}</p>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function renderSidePosts() {
      const sidePostList = document.getElementById("sidePostList");
      sidePostList.innerHTML = "";

      posts.forEach(post => {
        const item = document.createElement("div");
        item.className = "side-post";
        item.textContent = post.title;
        item.onclick = () => openModal(post);
        sidePostList.appendChild(item);
      });
    }

    function openModal(post) {
      document.getElementById("modalImage").src = post.image;
      document.getElementById("modalImage").alt = post.title;
      document.getElementById("modalTitle").textContent = post.title;
      document.getElementById("modalMeta").textContent = `${post.category} · ${post.date}`;
      document.getElementById("modalContent").textContent = post.content;
      document.getElementById("postModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("postModal").style.display = "none";
    }

    window.onclick = function(event) {
      const modal = document.getElementById("postModal");
      if (event.target === modal) {
        closeModal();
      }
    };

    init();
  </script>
</body>
</html>
